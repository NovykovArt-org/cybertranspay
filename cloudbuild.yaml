# Cloud Build: build → push → update Cloud Run routing-engine
#
# Manual update:
#   gcloud builds submit --config=cloudbuild.yaml --project=cybertranspay
#
# Or: scripts\update-routing-engine.cmd

substitutions:
  _REGION: europe-west1
  _REPOSITORY: cybertranspay
  _SERVICE: routing-engine

steps:
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - -f
      - backend/routing-engine/Dockerfile
      - backend

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}
    waitFor: [docker-build]

  # services update (not deploy) — сервис уже создан; без --allow-unauthenticated
  - id: update-cloud-run
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - --region=${_REGION}
      - --project=$PROJECT_ID
      - --quiet
    waitFor: [docker-push]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest

options:
  logging: LEGACY
  machineType: E2_HIGHCPU_8

timeout: 1800s
