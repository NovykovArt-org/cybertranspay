name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Check Rust code
        run: |
          if [ -d "backend" ]; then
            cd backend && cargo test --all
          fi

      - name: Setup Flutter
        env:
          FLUTTER_VERSION: '3.24.5'
          FLUTTER_ARCHIVE_URL: 'https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.24.5-stable.tar.xz'
        run: |
          set -euo pipefail

          FLUTTER_DIR="$RUNNER_TEMP/flutter-sdk"
          FLUTTER_ARCHIVE="$RUNNER_TEMP/flutter.tar.xz"
          rm -rf "$FLUTTER_DIR" "$RUNNER_TEMP/flutter" "$FLUTTER_ARCHIVE"

          if curl -fsSL "$FLUTTER_ARCHIVE_URL" -o "$FLUTTER_ARCHIVE"; then
            tar -xf "$FLUTTER_ARCHIVE" -C "$RUNNER_TEMP"
            mv "$RUNNER_TEMP/flutter" "$FLUTTER_DIR"
          else
            git clone --depth 1 --branch "$FLUTTER_VERSION" https://github.com/flutter/flutter.git "$FLUTTER_DIR"
          fi

          echo "$FLUTTER_DIR/bin" >> "$GITHUB_PATH"
          "$FLUTTER_DIR/bin/flutter" --version
          "$FLUTTER_DIR/bin/dart" --version

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Check Flutter
        run: |
          if [ -d "frontend" ]; then
            cd frontend && flutter pub get && flutter analyze && flutter test
          fi

      - name: Terraform Validate
        run: |
          if [ -d "terraform" ]; then
            cd terraform && terraform fmt -check -recursive
            terraform init -backend=false
            terraform validate
          fi

      - name: ✅ All checks passed
        run: echo "CI/CD completed successfully!"
