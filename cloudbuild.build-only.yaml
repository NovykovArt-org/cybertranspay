# Только сборка и push (без деплоя в Cloud Run)
# Используйте, если deploy делаете вручную:
#   gcloud run deploy routing-engine --image=...:latest ...

substitutions:
  _REGION: europe-west1
  _REPOSITORY: cybertranspay
  _SERVICE: routing-engine

steps:
  - id: docker-build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest
      - -f
      - backend/routing-engine/Dockerfile
      - backend

  - id: docker-push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}
    waitFor: [docker-build]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:$BUILD_ID
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_SERVICE}:latest

options:
  logging: LEGACY
  machineType: E2_HIGHCPU_8

timeout: 1800s
